<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a4f8a"/>
      <stop offset="100%" stop-color="#1574c4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Clean room walls -->
  <rect x="100" y="80" width="400" height="250" fill="white" opacity="0.1" rx="2"/>
  <!-- Ceiling panels with filter units -->
  <rect x="100" y="80" width="400" height="30" fill="white" opacity="0.15"/>
  <rect x="120" y="85" width="80" height="20" fill="white" opacity="0.2" rx="2"/>
  <rect x="220" y="85" width="80" height="20" fill="white" opacity="0.2" rx="2"/>
  <rect x="320" y="85" width="80" height="20" fill="white" opacity="0.2" rx="2"/>
  <rect x="420" y="85" width="60" height="20" fill="white" opacity="0.2" rx="2"/>
  <!-- Down arrows (airflow) -->
  <path d="M160,115 L160,160 M150,150 L160,165 L170,150" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M260,115 L260,160 M250,150 L260,165 L270,150" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M360,115 L360,160 M350,150 L360,165 L370,150" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M450,115 L450,160 M440,150 L450,165 L460,150" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Work stations -->
  <rect x="140" y="230" width="100" height="8" fill="white" opacity="0.25" rx="1"/>
  <rect x="160" y="238" width="8" height="60" fill="white" opacity="0.2"/>
  <rect x="220" y="238" width="8" height="60" fill="white" opacity="0.2"/>
  <rect x="340" y="230" width="100" height="8" fill="white" opacity="0.25" rx="1"/>
  <rect x="360" y="238" width="8" height="60" fill="white" opacity="0.2"/>
  <rect x="420" y="238" width="8" height="60" fill="white" opacity="0.2"/>
  <!-- Floor -->
  <rect x="100" y="300" width="400" height="30" fill="white" opacity="0.08"/>
  <!-- Title -->
  <text x="300" y="370" text-anchor="middle" fill="white" font-size="32" font-weight="bold" font-family="sans-serif">洁净车间</text>
  <text x="300" y="400" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" opacity="0.7" letter-spacing="2">CLEAN WORKSHOP</text>
</svg>