<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#f8fafc"/>
  <!-- Panel cross-section view -->
  <!-- Outer steel plate top -->
  <rect x="80" y="140" width="340" height="15" fill="#0d5ba6" opacity="0.7" rx="1"/>
  <!-- Rock wool core -->
  <rect x="80" y="155" width="340" height="120" fill="#C4975A" opacity="0.3" rx="0"/>
  <!-- Wool texture lines -->
  <line x1="100" y1="175" x2="400" y2="175" stroke="#C4975A" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="195" x2="400" y2="195" stroke="#C4975A" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="215" x2="400" y2="215" stroke="#C4975A" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="235" x2="400" y2="235" stroke="#C4975A" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="255" x2="400" y2="255" stroke="#C4975A" stroke-width="0.8" opacity="0.4"/>
  <!-- Outer steel plate bottom -->
  <rect x="80" y="275" width="340" height="15" fill="#0d5ba6" opacity="0.7" rx="1"/>
  <!-- Side view label lines -->
  <line x1="440" y1="147" x2="470" y2="130" stroke="#666" stroke-width="1"/>
  <text x="475" y="135" fill="#666" font-size="11" font-family="sans-serif">彩钢板</text>
  <line x1="440" y1="215" x2="470" y2="215" stroke="#666" stroke-width="1"/>
  <text x="475" y="220" fill="#666" font-size="11" font-family="sans-serif">岩棉芯</text>
  <line x1="440" y1="282" x2="470" y2="300" stroke="#666" stroke-width="1"/>
  <text x="475" y="305" fill="#666" font-size="11" font-family="sans-serif">彩钢板</text>
  <!-- 3D perspective panel -->
  <rect x="120" y="320" width="200" height="8" fill="#0d5ba6" opacity="0.5" rx="1"/>
  <polygon points="120,320 160,305 360,305 320,320" fill="#0d5ba6" opacity="0.6"/>
  <polygon points="320,320 360,305 360,313 320,328" fill="#0d5ba6" opacity="0.4"/>
  <!-- Label -->
  <text x="250" y="400" text-anchor="middle" fill="#0d5ba6" font-size="18" font-weight="bold" font-family="sans-serif">手工岩棉夹芯板</text>
</svg>