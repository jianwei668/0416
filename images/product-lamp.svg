<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#f8fafc"/>
  <!-- Lamp body -->
  <rect x="150" y="120" width="200" height="50" fill="#e8eff7" stroke="#0d5ba6" stroke-width="2" rx="6"/>
  <!-- UV tubes -->
  <rect x="175" y="175" width="8" height="120" fill="#7ec8f0" opacity="0.6" rx="4"/>
  <rect x="205" y="175" width="8" height="120" fill="#7ec8f0" opacity="0.5" rx="4"/>
  <rect x="235" y="175" width="8" height="120" fill="#7ec8f0" opacity="0.7" rx="4"/>
  <rect x="265" y="175" width="8" height="120" fill="#7ec8f0" opacity="0.5" rx="4"/>
  <rect x="295" y="175" width="8" height="120" fill="#7ec8f0" opacity="0.6" rx="4"/>
  <!-- Glow effect -->
  <ellipse cx="250" cy="230" rx="90" ry="60" fill="#7ec8f0" opacity="0.08"/>
  <!-- Grid/catch tray -->
  <rect x="160" y="300" width="180" height="30" fill="#d0dce8" stroke="#8B9BB0" stroke-width="1" rx="3"/>
  <line x1="185" y1="300" x2="185" y2="330" stroke="#8B9BB0" stroke-width="0.8" opacity="0.5"/>
  <line x1="210" y1="300" x2="210" y2="330" stroke="#8B9BB0" stroke-width="0.8" opacity="0.5"/>
  <line x1="235" y1="300" x2="235" y2="330" stroke="#8B9BB0" stroke-width="0.8" opacity="0.5"/>
  <line x1="260" y1="300" x2="260" y2="330" stroke="#8B9BB0" stroke-width="0.8" opacity="0.5"/>
  <line x1="285" y1="300" x2="285" y2="330" stroke="#8B9BB0" stroke-width="0.8" opacity="0.5"/>
  <line x1="310" y1="300" x2="310" y2="330" stroke="#8B9BB0" stroke-width="0.8" opacity="0.5"/>
  <!-- Mounting bracket -->
  <rect x="230" y="90" width="40" height="30" fill="#8B9BB0" rx="3"/>
  <rect x="245" y="75" width="10" height="20" fill="#8B9BB0" rx="2"/>
  <!-- Label -->
  <text x="250" y="400" text-anchor="middle" fill="#0d5ba6" font-size="18" font-weight="bold" font-family="sans-serif">蚊蝇诱灭灯</text>
</svg>