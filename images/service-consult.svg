<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#d1e9f9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Desk -->
  <rect x="80" y="220" width="440" height="8" fill="#8B7355" rx="2"/>
  <rect x="100" y="228" width="10" height="120" fill="#8B7355" rx="1"/>
  <rect x="490" y="228" width="10" height="120" fill="#8B7355" rx="1"/>
  <!-- Monitor -->
  <rect x="220" y="100" width="160" height="110" fill="#1a1a2e" rx="6"/>
  <rect x="228" y="108" width="144" height="88" fill="#0d5ba6" rx="2"/>
  <text x="300" y="160" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif">净化工程方案</text>
  <rect x="280" y="210" width="40" height="12" fill="#555" rx="1"/>
  <rect x="260" y="218" width="80" height="4" fill="#666" rx="1"/>
  <!-- Documents -->
  <rect x="120" y="190" width="70" height="30" fill="white" rx="2" stroke="#ddd" stroke-width="1"/>
  <line x1="130" y1="200" x2="178" y2="200" stroke="#0d5ba6" stroke-width="2" opacity="0.5"/>
  <line x1="130" y1="208" x2="170" y2="208" stroke="#ccc" stroke-width="1.5"/>
  <!-- Clipboard -->
  <rect x="410" y="170" width="60" height="50" fill="white" rx="3" stroke="#ddd" stroke-width="1"/>
  <rect x="428" y="165" width="24" height="10" fill="#0d5ba6" rx="2"/>
  <line x1="420" y1="185" x2="460" y2="185" stroke="#0d5ba6" stroke-width="2" opacity="0.4"/>
  <line x1="420" y1="195" x2="455" y2="195" stroke="#ccc" stroke-width="1.5"/>
  <line x1="420" y1="205" x2="450" y2="205" stroke="#ccc" stroke-width="1.5"/>
  <!-- Person silhouette -->
  <circle cx="300" cy="50" r="25" fill="#0d5ba6" opacity="0.3"/>
  <rect x="275" y="75" width="50" height="30" fill="#0d5ba6" opacity="0.2" rx="10"/>
</svg>