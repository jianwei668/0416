<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f9"/>
      <stop offset="100%" stop-color="#dce8f3"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Blueprint paper -->
  <rect x="80" y="60" width="440" height="330" fill="#1a3a5c" rx="4" opacity="0.9"/>
  <!-- Grid lines -->
  <line x1="80" y1="120" x2="520" y2="120" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="180" x2="520" y2="180" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="240" x2="520" y2="240" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="300" x2="520" y2="300" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <line x1="160" y1="60" x2="160" y2="390" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="60" x2="240" y2="390" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <line x1="320" y1="60" x2="320" y2="390" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="60" x2="400" y2="390" stroke="#4da8e8" stroke-width="0.5" opacity="0.3"/>
  <!-- Room layout -->
  <rect x="140" y="100" width="200" height="120" fill="none" stroke="#7ec8f0" stroke-width="2" rx="2"/>
  <text x="240" y="165" text-anchor="middle" fill="#7ec8f0" font-size="14" font-family="sans-serif">洁净区</text>
  <rect x="360" y="100" width="120" height="120" fill="none" stroke="#4da8e8" stroke-width="1.5" rx="2" stroke-dasharray="5,3"/>
  <text x="420" y="165" text-anchor="middle" fill="#4da8e8" font-size="11" font-family="sans-serif">缓冲区</text>
  <!-- Airflow arrows -->
  <path d="M200,260 L200,320 L240,320" fill="none" stroke="#7ec8f0" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M300,260 L300,320 L340,320" fill="none" stroke="#7ec8f0" stroke-width="2"/>
  <!-- Dimensions -->
  <line x1="140" y1="360" x2="340" y2="360" stroke="#C4975A" stroke-width="1.5"/>
  <line x1="140" y1="355" x2="140" y2="365" stroke="#C4975A" stroke-width="1.5"/>
  <line x1="340" y1="355" x2="340" y2="365" stroke="#C4975A" stroke-width="1.5"/>
  <text x="240" y="378" text-anchor="middle" fill="#C4975A" font-size="11" font-family="sans-serif">12000mm</text>
  <!-- Ruler -->
  <rect x="100" y="80" width="16" height="8" fill="#C4975A" opacity="0.6" rx="1"/>
  <text x="108" y="76" text-anchor="middle" fill="#7ec8f0" font-size="9" font-family="sans-serif">设计图</text>
</svg>