<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f9"/>
      <stop offset="100%" stop-color="#e4edf7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Newspaper/tablet representation -->
  <rect x="150" y="60" width="500" height="380" fill="white" stroke="#ddd" stroke-width="2" rx="8"/>
  <!-- Header bar -->
  <rect x="150" y="60" width="500" height="50" fill="#0d5ba6" rx="8 8 0 0"/>
  <text x="400" y="92" text-anchor="middle" fill="white" font-size="20" font-weight="bold" font-family="sans-serif">月恒净化 · 新闻动态</text>
  <!-- News item 1 -->
  <rect x="180" y="130" width="60" height="60" fill="#e8f4fd" rx="4"/>
  <circle cx="210" cy="160" r="15" fill="#0d5ba6" opacity="0.2"/>
  <text x="210" y="165" text-anchor="middle" fill="#0d5ba6" font-size="12" font-family="sans-serif">03</text>
  <text x="210" y="178" text-anchor="middle" fill="#0d5ba6" font-size="8" font-family="sans-serif">月</text>
  <line x1="260" y1="145" x2="600" y2="145" stroke="#333" stroke-width="1.5"/>
  <line x1="260" y1="165" x2="550" y2="165" stroke="#ccc" stroke-width="1"/>
  <line x1="260" y1="180" x2="500" y2="180" stroke="#ccc" stroke-width="1"/>
  <!-- News item 2 -->
  <rect x="180" y="210" width="60" height="60" fill="#e8f4fd" rx="4"/>
  <circle cx="210" cy="240" r="15" fill="#0d5ba6" opacity="0.2"/>
  <text x="210" y="245" text-anchor="middle" fill="#0d5ba6" font-size="12" font-family="sans-serif">02</text>
  <text x="210" y="258" text-anchor="middle" fill="#0d5ba6" font-size="8" font-family="sans-serif">月</text>
  <line x1="260" y1="225" x2="580" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="260" y1="245" x2="530" y2="245" stroke="#ccc" stroke-width="1"/>
  <line x1="260" y1="260" x2="480" y2="260" stroke="#ccc" stroke-width="1"/>
  <!-- News item 3 -->
  <rect x="180" y="290" width="60" height="60" fill="#e8f4fd" rx="4"/>
  <circle cx="210" cy="320" r="15" fill="#0d5ba6" opacity="0.2"/>
  <text x="210" y="325" text-anchor="middle" fill="#0d5ba6" font-size="12" font-family="sans-serif">01</text>
  <text x="210" y="338" text-anchor="middle" fill="#0d5ba6" font-size="8" font-family="sans-serif">月</text>
  <line x1="260" y1="305" x2="560" y2="305" stroke="#333" stroke-width="1.5"/>
  <line x1="260" y1="325" x2="520" y2="325" stroke="#ccc" stroke-width="1"/>
  <line x1="260" y1="340" x2="490" y2="340" stroke="#ccc" stroke-width="1"/>
  <!-- Decorative circle -->
  <circle cx="650" cy="500" r="80" fill="#0d5ba6" opacity="0.05"/>
  <circle cx="100" cy="520" r="60" fill="#0d5ba6" opacity="0.03"/>
</svg>