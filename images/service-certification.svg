<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6eff8"/>
      <stop offset="100%" stop-color="#cfe2f2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Certificate -->
  <rect x="140" y="60" width="320" height="330" fill="white" stroke="#C4975A" stroke-width="3" rx="4"/>
  <rect x="150" y="70" width="300" height="310" fill="none" stroke="#C4975A" stroke-width="1" rx="2" stroke-dasharray="8,4"/>
  <!-- Header decoration -->
  <circle cx="300" cy="120" r="30" fill="#0d5ba6" opacity="0.15"/>
  <circle cx="300" cy="120" r="20" fill="#0d5ba6" opacity="0.2"/>
  <text x="300" y="126" text-anchor="middle" fill="#0d5ba6" font-size="16" font-weight="bold" font-family="serif">✓</text>
  <!-- Certificate text -->
  <text x="300" y="175" text-anchor="middle" fill="#0d5ba6" font-size="20" font-weight="bold" font-family="serif">认证证书</text>
  <text x="300" y="200" text-anchor="middle" fill="#666" font-size="10" font-family="sans-serif">CERTIFICATION</text>
  <!-- Lines representing text -->
  <line x1="180" y1="230" x2="420" y2="230" stroke="#ddd" stroke-width="1.5"/>
  <line x1="200" y1="255" x2="400" y2="255" stroke="#eee" stroke-width="1.5"/>
  <line x1="210" y1="275" x2="390" y2="275" stroke="#eee" stroke-width="1.5"/>
  <line x1="220" y1="295" x2="380" y2="295" stroke="#eee" stroke-width="1.5"/>
  <!-- Stamp -->
  <circle cx="360" cy="340" r="25" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
  <text x="360" y="345" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="bold" font-family="serif" opacity="0.6">合格</text>
  <!-- Stars -->
  <text x="250" y="340" fill="#C4975A" font-size="14" opacity="0.7">★ ★ ★</text>
  <!-- Seal ribbon -->
  <rect x="270" y="380" width="60" height="20" fill="#C4975A" opacity="0.3" rx="2"/>
  <!-- Label -->
  <text x="300" y="430" text-anchor="middle" fill="#0d5ba6" font-size="16" font-weight="bold" font-family="sans-serif" opacity="0.6">工程认证</text>
</svg>