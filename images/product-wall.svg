<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#f8fafc"/>
  <!-- Wall panel 3D view -->
  <!-- Front face -->
  <rect x="100" y="100" width="220" height="280" fill="#4da8e8" opacity="0.6" rx="2"/>
  <!-- Panel grooves -->
  <line x1="100" y1="170" x2="320" y2="170" stroke="#0d5ba6" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="240" x2="320" y2="240" stroke="#0d5ba6" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="310" x2="320" y2="310" stroke="#0d5ba6" stroke-width="1" opacity="0.3"/>
  <!-- Side face (thickness) -->
  <polygon points="320,100 380,70 380,350 320,380" fill="#0d5ba6" opacity="0.4"/>
  <!-- Top face -->
  <polygon points="100,100 160,70 380,70 320,100" fill="#7ec8f0" opacity="0.5"/>
  <!-- Thickness label -->
  <line x1="385" y1="120" x2="420" y2="120" stroke="#666" stroke-width="1"/>
  <line x1="385" y1="300" x2="420" y2="300" stroke="#666" stroke-width="1"/>
  <line x1="420" y1="120" x2="420" y2="300" stroke="#666" stroke-width="1"/>
  <text x="430" y="215" fill="#666" font-size="11" font-family="sans-serif">50mm</text>
  <!-- Color samples -->
  <rect x="120" y="400" width="25" height="25" fill="#4da8e8" rx="3"/>
  <rect x="155" y="400" width="25" height="25" fill="#2a5caa" rx="3"/>
  <rect x="190" y="400" width="25" height="25" fill="#C4975A" rx="3"/>
  <rect x="225" y="400" width="25" height="25" fill="#e8e8e8" rx="3"/>
  <rect x="260" y="400" width="25" height="25" fill="#888" rx="3"/>
  <!-- Label -->
  <text x="250" y="460" text-anchor="middle" fill="#0d5ba6" font-size="18" font-weight="bold" font-family="sans-serif">手工彩钢外墙板</text>
</svg>