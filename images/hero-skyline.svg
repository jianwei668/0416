  <rect x="870" y="195" width="10" height="12" fill="#4da8e8" opacity="0.6" filter="url(#windowGlow)"/>
  <rect x="888" y="195" width="10" height="12" fill="#7ec8f0" opacity="0.3"/>
  <rect x="906" y="195" width="10" height="12" fill="#4da8e8" opacity="0.8" filter="url(#windowGlow)"/>
  <rect x="924" y="195" width="10" height="12" fill="#7ec8f0" opacity="0.5" filter="url(#windowGlow)"/>
