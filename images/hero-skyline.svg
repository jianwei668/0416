  <rect x="1280" y="275" width="12" height="14" fill="#4da8e8" opacity="0.4"/>
  <rect x="1300" y="275" width="12" height="14" fill="#7ec8f0" opacity="0.6" filter="url(#windowGlow)"/>
  <rect x="1360" y="350" width="90" height="330" fill="#0a3d6e" rx="2"/>
  <rect x="1480" y="400" width="70" height="280" fill="#083560" rx="2"/>
