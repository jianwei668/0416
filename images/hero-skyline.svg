  <rect x="888" y="170" width="10" height="12" fill="#4da8e8" opacity="0.5" filter="url(#windowGlow)"/>
  <rect x="906" y="170" width="10" height="12" fill="#7ec8f0" opacity="0.7" filter="url(#windowGlow)"/>
