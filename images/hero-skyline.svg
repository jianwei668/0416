  <rect x="400" y="690" width="140" height="130" fill="#072d52" opacity="0.25"/>
  <rect x="700" y="690" width="120" height="110" fill="#083560" opacity="0.2"/>
  <rect x="860" y="690" width="80" height="160" fill="#06305e" opacity="0.3"/>
  <rect x="980" y="690" width="110" height="120" fill="#0a4272" opacity="0.2"/>
  <rect x="1230" y="690" width="100" height="130" fill="#072d52" opacity="0.25"/>
  <!-- Reflection light lines -->
  <line x1="100" y1="720" x2="300" y2="720" stroke="#4da8e8" stroke-width="1" opacity="0.15"/>
  <line x1="500" y1="750" x2="800" y2="750" stroke="#7ec8f0" stroke-width="0.8" opacity="0.12"/>
  <line x1="900" y1="730" x2="1200" y2="730" stroke="#4da8e8" stroke-width="1" opacity="0.1"/>
