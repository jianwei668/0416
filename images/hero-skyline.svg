<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#041e42"/>
      <stop offset="40%" stop-color="#0a4f8a"/>
      <stop offset="70%" stop-color="#0d5ba6"/>
      <stop offset="100%" stop-color="#1a6fc4"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d5ba6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#041e42"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="200" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="450" cy="120" r="1" fill="white" opacity="0.4"/>
  <circle cx="700" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="900" cy="150" r="1" fill="white" opacity="0.3"/>
  <circle cx="1100" cy="70" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1300" cy="100" r="1" fill="white" opacity="0.4"/>
