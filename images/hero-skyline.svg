  <rect x="55" y="390" width="10" height="12" fill="#4da8e8" opacity="0.6" filter="url(#windowGlow)"/>
  <rect x="75" y="390" width="10" height="12" fill="#4da8e8" opacity="0.4"/>
  <rect x="95" y="390" width="10" height="12" fill="#4da8e8" opacity="0.5" filter="url(#windowGlow)"/>
  <rect x="55" y="415" width="10" height="12" fill="#4da8e8" opacity="0.3"/>
  <rect x="75" y="415" width="10" height="12" fill="#4da8e8" opacity="0.6" filter="url(#windowGlow)"/>
  <rect x="95" y="415" width="10" height="12" fill="#4da8e8" opacity="0.4"/>
  <rect x="55" y="440" width="10" height="12" fill="#4da8e8" opacity="0.5" filter="url(#windowGlow)"/>
  <rect x="75" y="440" width="10" height="12" fill="#7ec8f0" opacity="0.7" filter="url(#windowGlow)"/>
  <rect x="95" y="440" width="10" height="12" fill="#4da8e8" opacity="0.3"/>
