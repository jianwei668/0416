<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf4fb"/>
      <stop offset="100%" stop-color="#d8e9f6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Testing equipment -->
  <rect x="180" y="120" width="240" height="200" fill="#f0f5fa" stroke="#0d5ba6" stroke-width="2" rx="8"/>
  <!-- Screen -->
  <rect x="200" y="140" width="200" height="120" fill="#1a3a5c" rx="4"/>
  <!-- Chart on screen -->
  <polyline points="220,230 250,210 280,220 310,190 340,200 370,180" fill="none" stroke="#22c55e" stroke-width="2"/>
  <polyline points="220,240 250,225 280,235 310,215 340,225 370,210" fill="none" stroke="#4da8e8" stroke-width="1.5" opacity="0.6"/>
  <!-- Y axis -->
  <line x1="215" y1="155" x2="215" y2="245" stroke="#7ec8f0" stroke-width="1" opacity="0.5"/>
  <!-- X axis -->
  <line x1="215" y1="245" x2="380" y2="245" stroke="#7ec8f0" stroke-width="1" opacity="0.5"/>
  <!-- Readout display -->
  <rect x="210" y="280" width="80" height="25" fill="#0d5ba6" opacity="0.2" rx="3"/>
  <text x="250" y="297" text-anchor="middle" fill="#0d5ba6" font-size="12" font-family="monospace" font-weight="bold">99.99%</text>
  <rect x="310" y="280" width="80" height="25" fill="#22c55e" opacity="0.15" rx="3"/>
  <text x="350" y="297" text-anchor="middle" fill="#22c55e" font-size="12" font-family="monospace" font-weight="bold">PASS</text>
  <!-- Probe/sensor -->
  <rect x="460" y="160" width="60" height="120" fill="#d0dce8" stroke="#8B9BB0" stroke-width="1.5" rx="4"/>
  <circle cx="490" cy="200" r="15" fill="#0d5ba6" opacity="0.2"/>
  <circle cx="490" cy="200" r="8" fill="#0d5ba6" opacity="0.3"/>
  <circle cx="490" cy="200" r="3" fill="#22c55e" opacity="0.8"/>
  <rect x="485" y="280" width="10" height="60" fill="#8B9BB0" rx="2"/>
  <!-- Cable -->
  <path d="M420,200 Q440,200 460,200" fill="none" stroke="#8B9BB0" stroke-width="2"/>
  <!-- Label -->
  <text x="300" y="400" text-anchor="middle" fill="#0d5ba6" font-size="16" font-weight="bold" font-family="sans-serif" opacity="0.6">工程检测</text>
</svg>