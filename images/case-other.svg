<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06305e"/>
      <stop offset="100%" stop-color="#0b5498"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Operating room style -->
  <rect x="130" y="90" width="340" height="220" fill="white" opacity="0.1" rx="4"/>
  <!-- Surgical light -->
  <circle cx="300" cy="120" r="30" fill="white" opacity="0.15"/>
  <circle cx="300" cy="120" r="18" fill="white" opacity="0.2"/>
  <circle cx="300" cy="120" r="8" fill="#7ec8f0" opacity="0.4"/>
  <rect x="296" y="85" width="8" height="10" fill="white" opacity="0.2"/>
  <!-- Operating table -->
  <rect x="200" y="220" width="200" height="15" fill="white" opacity="0.2" rx="4"/>
  <rect x="250" y="235" width="100" height="60" fill="white" opacity="0.1" rx="2"/>
  <!-- Monitor -->
  <rect x="420" y="130" width="50" height="40" fill="white" opacity="0.15" rx="3"/>
  <line x1="430" y1="155" x2="460" y2="155" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <rect x="440" y="170" width="10" height="40" fill="white" opacity="0.1"/>
  <!-- IV stand -->
  <rect x="155" y="110" width="4" height="140" fill="white" opacity="0.2"/>
  <rect x="145" y="108" width="24" height="4" fill="white" opacity="0.2"/>
  <rect x="150" y="120" width="20" height="25" fill="white" opacity="0.12" rx="3"/>
  <!-- Title -->
  <text x="300" y="350" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="sans-serif">其它净化工程</text>
  <text x="300" y="380" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif" opacity="0.7" letter-spacing="2">OTHER WORKS</text>
</svg>